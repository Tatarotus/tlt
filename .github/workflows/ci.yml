name: Quality Gate Checks
on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  quality-checks:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Use Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'npm'
        cache-dependency-path: trello-like/package-lock.json

    - name: Install dependencies
      run: |
        cd trello-like
        npm ci

    - name: Run linting
      run: |
        cd trello-like
        npm run lint

    - name: Run type checking
      run: |
        cd trello-like
        npm run typecheck

    - name: Run complexity check
      run: |
        cd trello-like
        npm run quality:complexity

    - name: Run file size check
      run: |
        cd trello-like
        npm run quality:filesize

    - name: Run test coverage
      run: |
        cd trello-like
        npm run quality:coverage

    - name: Run mutation testing
      run: |
        cd trello-like
        npm run quality:mutation-analyze

    - name: Upload mutation report
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: mutation-report
        path: trello-like/reports/mutation/